packages:
  - 'packages/*'
  - 'apps/*'

# Single default catalog: every package references deps as "catalog:".
# Versions are transcribed verbatim from the pre-migration root package.json
# (dependencies + devDependencies). ZERO version bumps in this migration.
catalog:
  '@antfu/eslint-config': ^9.1.0
  '@commitlint/config-conventional': ^21.2.0
  # Flips Electron's runtime fuses on the packaged binary via an afterPack hook
  # (scripts/after-pack.cjs). Already present transitively under electron-builder;
  # pinned here so the desktop package can require() it directly.
  '@electron/fuses': ^2.1.3
  '@floating-ui/vue': ^2.0.1
  '@nuxt/fonts': ^0.14.0
  '@nuxtjs/i18n': ^10.5.0
  '@nuxtjs/tailwindcss': ^6.14.0
  '@pinia/nuxt': ^1.0.1
  '@playwright/test': ^1.61.1
  '@prettier/plugin-oxc': ^0.2.2
  '@tabler/icons-vue': ^3.45.0
  '@tailwindcss/typography': ^0.5.20
  '@tailwindcss/vite': ^4.3.3
  '@tanstack/vue-query': ^5.101.4
  '@tanstack/vue-virtual': ^3.13.33
  '@types/byte-size': ^8.1.2
  '@types/d3': ^7.4.3
  '@types/markdown-it': ^14.1.2
  '@types/node': ^26.1.1
  '@types/sortablejs': ^1.15.9
  '@vite-pwa/nuxt': ^1.1.1
  '@vitest/coverage-v8': ^4.1.10
  '@vueuse/core': ^14.3.0
  '@vueuse/integrations': ^14.3.0
  '@vueuse/nuxt': ^14.3.0
  byte-size: ^9.0.1
  commitlint: ^21.2.1
  d3: ^7.9.0
  daisyui: ^5.7.0
  dayjs: ^1.11.21
  electron: ^43.2.0
  electron-builder: ^26.0.0
  electron-vite: ^5.0.0
  eslint: ^10.7.0
  eslint-plugin-format: ^2.0.1
  # NEW-SUBSYSTEM deps (consumed by the future agent/server/desktop packages
  # in plans 02-05, NOT by packages/ui). These are brand-new catalog entries
  # for brand-new packages — they do NOT bump any existing dependency, so the
  # "ZERO version bumps" rule still holds (it forbids changing the version of
  # an already-present dep, not adding a new one). Versions come from spec §1.
  h3: ^1.15.11
  highcharts: ^13.0.0
  husky: ^9.1.7
  jsdom: ^29.1.1
  ky: ^2.0.2
  lint-staged: ^17.1.0
  markdown-it: ^14.3.0
  match-sorter: ^8.3.0
  meta-json-schema: ^1.19.28
  # PINNED, do not bump past 0.52.x. monaco-yaml@5.5.1 (latest) pulls
  # monaco-worker-manager@2.0.1 (latest), which calls the OLD
  # editor.createWebWorker({ moduleId, label, createData }) API. monaco-editor
  # 0.53.0 replaced that public signature with IInternalWebWorkerOptions
  # ({ worker, host }); on 0.55 the old call yields `worker: undefined` →
  # "Cannot use 'in' operator to search for 'then' in undefined" → the YAML
  # language worker silently falls back to the main-thread editor worker, which
  # has no YAML methods ("Missing requestHandler or method: doValidation/...").
  # 0.52.2 is the last release with the old IWebWorkerOptions public API.
  # Bundle size also depends on this pin: 0.53+ instantiates language workers
  # via `new Worker(new URL(...))`, which makes Vite emit every monaco worker
  # (ts/css/html, ~9 MB) into the dist even though only yaml is used (#2101).
  # Dependabot is configured to ignore this package (.github/dependabot.yml).
  monaco-editor: 0.52.2
  monaco-yaml: ^5.5.1
  nitropack: ^2.12.6
  nuxt: 4.5.0
  pinia: ^4.0.2
  playwright: ^1.61.1
  prettier: ^3.9.6
  prettier-plugin-tailwindcss: ^0.8.1
  sort-package-json: ^4.0.0
  sortablejs: ^1.15.7
  tailwindcss: ^4.3.3
  tree-kill: ^1.2.2
  tsx: ^4.23.1
  typescript: ^7.0.2
  uqr: ^0.1.2
  vite: 8.1.5
  vitest: ^4.1.10
  vue: ^3.5.40
  vue-router: ^5.2.0
  vue-sonner: ^2.0.9
  vue-tsc: ^3.3.7
  yaml: ^2.9.0

neverBuiltDependencies: []

# overrides MUST live only at the workspace root (pnpm 10/11). This is the
# merge of OLD package.json#pnpm.overrides + the OLD workspace override.
# CONFLICT RESOLUTION (see spec §2): the old package.json pinned
# vite: 8.1.5 in BOTH dependencies and pnpm.overrides, but the old
# pnpm-workspace.yaml override 'vite: npm:rolldown-vite@latest' WON at install
# time — the project already runs on rolldown-vite. Keep ONLY rolldown-vite
# here; drop the 8.0.16 pin. (The 8.0.16 entry survives in the catalog above
# only as the plain `vite` dependency version for any package that lists it;
# the override below remaps it to rolldown-vite at resolution time, exactly as
# today.)
overrides:
  '@isaacs/brace-expansion': '>=5.0.1'
  '@nuxt/devtools-kit': 3.2.4
  'brace-expansion@^1': '>=1.1.15'
  'brace-expansion@^2': '>=2.1.1'
  defu: 6.1.7
  diff: '>=9.0.0'
  # Dependabot transitive-vuln patches. Scoped per major so the bump stays
  # within the resolved line (no cross-major API breakage). esbuild's vuln
  # range is 0.27.3–0.28.0; the unrelated 0.25.12 (< floor) is left untouched.
  'esbuild@0.27': 0.28.1
  'esbuild@0.28': 0.28.1
  h3: '>=1.15.11'
  'js-yaml@4': ^4.2.0
  koa: '>=3.2.1'
  node-forge: '>=1.4.0'
  picomatch: '>=4.0.4'
  rollup: '>=4.60.4'
  serialize-javascript: '>=7.0.5'
  srvx: '>=0.11.16'
  tar: '>=7.5.15'
  'undici@6': ^6.27.0
  'undici@7': ^7.28.0
  # Pin the exact rolldown-vite version (was '@latest'). @latest is a moving
  # target — only the lockfile kept a fresh install from pulling a newer pre-1.0
  # rolldown-vite that could silently change electron-vite's main/helper
  # bundling. Bump deliberately, as a reviewed change.
  vite: 'npm:rolldown-vite@7.3.1'
  yaml: '>=2.9.0'
